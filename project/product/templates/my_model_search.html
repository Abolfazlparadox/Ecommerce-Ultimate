<!-- search_results.html -->

<h2>Search Results</h2>

<h2>Search Results for "{{ query }}"</h2>

<form method="get" action="{% url 'search_view' %}">
    <input type="text" name="search" value="{{ query }}" placeholder="Search...">
    <select name="category">
        <option value="" selected>All Categories</option>
        {% for value , label in category %}
        <option value="{{ value }}"> {{ label }}</option>
        {% endfor %}
    </select>
    <button type="submit">Search</button>
</form>

{% if products %}
    <ul>
        {% for product in products %}
            <li>{{ product.title }} - {{ category.title }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>No results found.</p>
{% endif %}

{% comment %} <script>
  $(document).ready(function() {
    $('#search-form').submit(function(event) {
      event.preventDefault();
      var query = $('#search-input').val();

      $.ajax({
        url: '{% url "my-model-search" %}',
        data: { 'q': query },
        success: function(data) {
          $('#search-results-container').html(data);
        }
      });
    });
  });
</script> {% endcomment %}
